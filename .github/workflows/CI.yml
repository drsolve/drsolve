name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-22.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Restore FLINT static install cache
        id: flint-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: linux-flint-3.6-static-${{ runner.arch }}-v1

      - name: Build FLINT (static) - version 3.6.0
        if: steps.flint-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch flint-3.6 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      - name: Save FLINT static install cache
        if: steps.flint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: linux-flint-3.6-static-${{ runner.arch }}-v1

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.6.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config binutils

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Restore FLINT static install cache
        id: flint-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: macos-flint-3.6-static-renamed-${{ runner.arch }}-v1

      - name: Build FLINT (static) - version 3.6.0
        if: steps.flint-cache.outputs.cache-hit != 'true'
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.6 https://github.com/flintlib/flint.git
          cd flint
          # Rename the few FLINT symbols that conflict with bundled PML on macOS.
          # This keeps FLINT internally consistent while avoiding duplicate symbols
          # at final link time.
          find . -type f \( -name '*.c' -o -name '*.h' \) -print0 | xargs -0 perl -pi -e '
            s/\bnmod_mat_left_nullspace\b/flint_nmod_mat_left_nullspace/g;
            s/\bnmod_mat_nullspace\b/flint_nmod_mat_nullspace/g;
            s/\bfmpz_mat_nullspace\b/flint_fmpz_mat_nullspace/g;
            s/\bfmpz_mat_rank\b/flint_fmpz_mat_rank/g;
            s/\bfmpz_mat_solve\b/flint_fmpz_mat_solve/g;
          '
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Save FLINT static install cache
        if: steps.flint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: macos-flint-3.6-static-renamed-${{ runner.arch }}-v1

      - name: Verify renamed FLINT symbols
        run: |
          set -eu
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          for sym in \
            _nmod_mat_left_nullspace \
            _nmod_mat_nullspace \
            _fmpz_mat_nullspace \
            _fmpz_mat_rank \
            _fmpz_mat_solve; do
            sym_lines="$(nm -g "$FLINT_A" | grep -w "$sym" | grep -v ' U ' || true)"
            if [ -n "$sym_lines" ]; then
              echo "Error: original conflicting symbol $sym is still exported by FLINT."
              echo "$sym_lines"
              exit 1
            fi
          done
          echo "Success: FLINT no longer exports the original conflicting symbols."

      - name: Configure project (static)
        run: |
          export LDFLAGS="-L$INSTALL_PREFIX/lib -Wl,-no_compact_unwind"
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Adjust macOS static link settings
        run: |
          perl -0pi -e 's/^LTO_CFLAGS = .*$/LTO_CFLAGS = /m; s/^LTO_LDFLAGS = .*$/LTO_LDFLAGS = /m; s#^FLINT_STATIC_LIBS = .*$#FLINT_STATIC_LIBS = '"$INSTALL_PREFIX"'/lib/libflint.a#m; s#^FLINT_FLAGS = .*$#FLINT_FLAGS = -DHAVE_FLINT -Dnmod_mat_nullspace=flint_nmod_mat_nullspace -Dfmpz_mat_nullspace=flint_fmpz_mat_nullspace -Dfmpz_mat_rank=flint_fmpz_mat_rank -Dfmpz_mat_solve=flint_fmpz_mat_solve#m' config.mk
          echo "=== config.mk overrides ==="
          grep -E '^(LTO_CFLAGS|LTO_LDFLAGS|FLINT_STATIC_LIBS|FLINT_FLAGS) =' config.mk

      - name: Build
        run: |
          export LDFLAGS="-L$INSTALL_PREFIX/lib -Wl,-no_compact_unwind"
          make static-all -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.6.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
